[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fd-extractai-report"
version = "0.1.1"
requires-python = ">=3.10"
dependencies = [
    "markitdown[docx,pdf,xlsx]>=0.1.5",
    "markitdown-ocr>=0.1.0",
    "langextract>=1.1.1",
    "markdown-it-py>=3.0.0",
    "openai>=1.0.0",
    "pydantic>=2.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
fd_extractai_report = [
    "benchmarks/*.json",
    "config/*.yaml",
    "prompts/*.txt",
    "rules/**/*.json",
    "rules/**/*.yaml",    
]
