[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fd-extractai-report"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "markitdown[docx,pdf,xlsx]>=0.1.5",
    "langextract>=1.1.1"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]